<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avynn's Prayer Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800&family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080D18;--bg-card:#0D1322;--bg-card-hover:#111A2E;--bg-surface:#0F1628;
  --border:#1A2540;--border-light:#253556;
  --teal:#36E8D0;--teal-bright:#5CFCE8;--teal-glow:rgba(54,232,208,.1);--teal-border:rgba(54,232,208,.3);
  --gold:#F0C050;--gold-bright:#FFD97A;--gold-hot:#FFBE2E;--gold-dim:#B8912A;
  --gold-glow:rgba(240,192,80,.12);--gold-glow-strong:rgba(240,192,80,.2);--gold-border:rgba(240,192,80,.35);
  --text:#F2F0EB;--text-body:#E0DDD6;--text-secondary:#A8B0BE;--text-dim:#6B7A90;--text-ghost:#3D4E65;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse at center,rgba(54,232,208,.04) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:0;left:30%;width:600px;height:500px;background:radial-gradient(ellipse at center,rgba(240,192,80,.03) 0%,transparent 70%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.header{padding:56px 24px 48px;text-align:center;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(600px,85%);height:1px;background:linear-gradient(90deg,transparent,var(--teal),var(--gold-dim),var(--teal),transparent);box-shadow:0 0 12px rgba(54,232,208,.15)}
.h-tag{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:6px;color:var(--teal);text-transform:uppercase;margin-bottom:24px;text-shadow:0 0 30px rgba(54,232,208,.4)}
.h-title{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(48px,9vw,80px);line-height:1.05;margin-bottom:6px}
.h-title span{color:var(--text)}
.h-title em{font-style:italic;font-weight:700;background:linear-gradient(135deg,var(--teal-bright),var(--teal),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 12px rgba(54,232,208,.35))}
.h-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:4px;margin-top:22px;text-transform:uppercase}
.h-verse{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--text-secondary);margin-top:24px;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.65;border-left:2px solid var(--teal-border);padding-left:20px;text-align:left}
.h-verse-ref{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal);margin-top:10px;letter-spacing:1.5px}
.domain-nav{padding:32px 20px 0;max-width:840px;margin:0 auto}
.nav-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--teal);text-transform:uppercase;margin-bottom:16px;text-align:center;text-shadow:0 0 12px rgba(54,232,208,.15)}
.domain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.d-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .3s;text-align:left}
.d-btn:hover{background:var(--bg-card-hover);border-color:var(--border-light);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.d-btn.on{background:var(--bg-card-hover);border-color:var(--teal-border);box-shadow:0 0 25px var(--teal-glow),inset 0 1px 0 rgba(54,232,208,.05)}
.d-ico{font-size:24px;flex-shrink:0}
.d-nm{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--text-secondary);transition:all .3s;letter-spacing:.3px}
.d-btn.on .d-nm{color:var(--teal-bright);text-shadow:0 0 20px rgba(54,232,208,.2)}
.d-btn:hover .d-nm{color:var(--text)}
.d-vs{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-ghost);margin-top:3px;transition:color .3s}
.d-btn.on .d-vs{color:var(--text-dim)}
.fn-section{padding:28px 20px 0;max-width:840px;margin:0 auto}
.fn-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.fn-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--teal);text-transform:uppercase}
.fn-views{display:flex;gap:4px}
.fn-vb{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:2px;padding:7px 18px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;transition:all .25s;text-transform:uppercase}
.fn-vb.on{border-color:var(--teal-border);color:var(--teal);background:var(--teal-glow);box-shadow:0 0 16px rgba(54,232,208,.08)}
.fn-grid{display:flex;flex-wrap:wrap;gap:8px}
.f-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .25s}
.f-btn:hover{border-color:var(--border-light);background:var(--bg-card-hover);transform:translateY(-1px)}
.f-btn.on{border-color:color-mix(in srgb,var(--fn-color) 40%,transparent);background:color-mix(in srgb,var(--fn-color) 6%,var(--bg-card));box-shadow:0 0 20px color-mix(in srgb,var(--fn-color) 10%,transparent)}
.f-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-ghost);transition:color .25s}
.f-btn.on .f-num{color:var(--fn-color)}
.f-nm{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text-dim);transition:all .25s;letter-spacing:.3px}
.f-btn.on .f-nm{color:var(--text);font-weight:600}
.f-dot{width:8px;height:8px;border-radius:50%;opacity:0;transition:all .25s;margin-left:4px}
.f-btn.on .f-dot{opacity:1;box-shadow:0 0 6px var(--fn-color),0 0 14px var(--fn-color)}
.content{padding:32px 20px 60px;max-width:840px;margin:0 auto}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:35vh;text-align:center;padding:40px 20px}
.empty-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text-dim)}
.empty-verse{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--text-ghost);margin-top:14px}
.prayer-card{animation:cardIn .4s ease;border-radius:12px;overflow:hidden;position:relative;background:var(--bg-card);border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,.3)}
.pc-accent{height:3px;position:relative}
.pc-accent::after{content:'';position:absolute;inset:0;filter:blur(6px);opacity:.6}
.pc-body{padding:36px 32px 40px}
.pc-route{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.pc-desc{font-family:'Inter',sans-serif;font-size:13px;color:var(--text-dim);margin-bottom:28px;line-height:1.5}
.pc-ref{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;margin-bottom:12px}
.pc-verse{font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--text-secondary);line-height:1.7;padding-left:20px;margin-bottom:36px;position:relative}
.pc-verse::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
.pc-divider{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.pc-divider-label{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;white-space:nowrap}
.pc-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-light),transparent)}
.pc-prayer p{font-family:'Playfair Display',serif;font-size:20px;line-height:1.9;color:var(--text-body);margin-bottom:22px;font-weight:400}
.pc-prayer p:first-child::first-letter{font-size:28px;font-weight:700;color:var(--text);float:left;margin-right:3px;line-height:1}
.pc-prayer p:last-child{margin-bottom:0}
.full-header{margin-bottom:36px;text-align:center;position:relative}
.full-header::after{content:'';position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--teal-border),transparent)}
.full-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:5px;color:var(--teal);text-transform:uppercase;margin-bottom:14px}
.full-nm{font-family:'Playfair Display',serif;font-size:36px;font-weight:800;margin-bottom:6px}
.full-nm .ico{margin-right:10px}
.full-ds{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--text-secondary)}
.full-card{margin-bottom:20px;border-radius:12px;overflow:hidden;opacity:0;animation:cardIn .4s ease forwards;position:relative;background:var(--bg-card);border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.25)}
.full-card:hover{border-color:var(--border-light)}
.fc-accent{height:3px;position:relative}
.fc-accent::after{content:'';position:absolute;inset:0;filter:blur(5px);opacity:.5}
.fc-body{padding:28px 26px 32px}
.fc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.fc-num{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;opacity:.4}
.fc-fnm{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.fc-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1.5px;padding:4px 12px;border-radius:5px;border:1px solid;margin-left:auto}
.fc-ref{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:10px}
.fc-verse{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--text-secondary);padding-left:16px;margin-bottom:26px;line-height:1.6;position:relative}
.fc-verse::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
.fc-body>p{font-family:'Playfair Display',serif;font-size:18px;line-height:1.85;color:var(--text-body);margin-bottom:16px;font-weight:400}
.footer{padding:48px 24px;text-align:center;position:relative}
.footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(500px,70%);height:1px;background:linear-gradient(90deg,transparent,var(--teal-border),transparent)}
.ftr-v{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--text-ghost)}
.ftr-r{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--teal);opacity:.4;letter-spacing:2px;margin-top:8px}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  .domain-grid{grid-template-columns:1fr}
  .fn-grid{gap:6px}
  .f-btn{padding:9px 12px}
  .f-nm{font-size:12px}
  .pc-body{padding:28px 22px 32px}
  .pc-prayer p{font-size:18px;line-height:1.85}
  .pc-ref{font-size:26px}
  .pc-verse{font-size:17px}
  .fc-body{padding:24px 20px 28px}
  .fc-body>p{font-size:16px}
  .header{padding:40px 20px 36px}
  .h-title{font-size:clamp(40px,10vw,64px)}
  .h-verse{font-size:16px;padding-left:16px}
  .full-nm{font-size:28px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
var D=[{"id":"identity","nm":"Identity","ico":"✨","vs":"Psalm 139:14","ds":"Who God made you — chosen, known, and wonderfully made"},{"id":"family","nm":"Family","ico":"🏠","vs":"Psalm 68:6","ds":"Your home, your parents, where you belong and are safe"},{"id":"heart","nm":"Heart","ico":"💛","vs":"Psalm 34:18","ds":"Your feelings — being brave, not being afraid"},{"id":"friends","nm":"Friends","ico":"🌿","vs":"1 John 4:7","ds":"How to love people, be kind, be a good friend"},{"id":"mind","nm":"Mind","ico":"⚡","vs":"Proverbs 2:6","ds":"Learning, wondering, and filling your mind with good things"},{"id":"body","nm":"Body","ico":"🌟","vs":"Psalm 139:13","ds":"God made your body just right — take care of it"},{"id":"faith","nm":"Faith","ico":"🙏","vs":"John 3:16","ds":"Knowing God, talking to Him, trusting Him always"}];
var F=[{"id":"adoration","nm":"Adoration","n":"01","hex":"#FFD97A","ds":"Telling God how great and wonderful He is"},{"id":"confession","nm":"Confession","n":"02","hex":"#C4A882","ds":"Saying sorry and starting fresh"},{"id":"thanksgiving","nm":"Thanksgiving","n":"03","hex":"#34EDAA","ds":"Saying thank You for all the good things"},{"id":"supplication","nm":"Asking","n":"04","hex":"#6CB4FF","ds":"Asking God for what you need"},{"id":"intercession","nm":"Praying for Others","n":"05","hex":"#B496FF","ds":"Praying for people you love and people who need help"},{"id":"declaration","nm":"Declaration","n":"06","hex":"#FFB830","ds":"Speaking out loud what God says is true about you"},{"id":"warfare","nm":"Protection","n":"07","hex":"#FF7777","ds":"Asking God to keep the scary things away"}];
var MAP={"identity":{"adoration":{"scripture":"Psalm 139:14","text":"I praise you because I am fearfully and wonderfully made; your works are wonderful, I know that full well.","prayer":"God, You are so big and so good. You made everything — the sun and the moon and the stars and all the animals. And You made me too. You thought about me before I was even born. You decided what color my eyes would be and what my laugh would sound like and what would make me happy. I worship You because You made me on purpose. Not by accident. On purpose. You wanted me here.\n\nYou are the best artist ever. You made butterflies and flowers and puppies and rainbows. And You made Avynn. I am one of Your best things. I worship You for making me.\n\nThank You that You never make mistakes. When You made me, You did it exactly right. I worship You, God. You are wonderful and You made me wonderful too."},"confession":{"scripture":"1 John 1:9","text":"If we confess our sins, he is faithful and just and will forgive us our sins and purify us from all unrighteousness.","prayer":"God, sometimes I do things that are not good. Sometimes I am not kind. Sometimes I say no when I should say yes. Sometimes I grab things and do not share. I am sorry for those times.\n\nYou always forgive me when I say sorry. Every single time. That makes me feel so safe. I do not have to hide from You when I do something wrong. I can just come to You and say sorry and You hug me and we start over.\n\nI love that You always forgive me, God. Help me to do better tomorrow."},"thanksgiving":{"scripture":"Psalm 100:3","text":"Know that the Lord is God. It is He who made us, and we are His; we are His people, the sheep of His pasture.","prayer":"Thank You, God, for making me. Thank You that I am Yours. I belong to You and that makes me feel so safe and happy.\n\nThank You for my name. Thank You for my face. Thank You for my hands and my feet and my voice. Thank You that when I laugh, You smile. Thank You that You know my name — Avynn — and You love saying it.\n\nThank You that I am not an accident. You made me because You wanted me. That is the best thing. I am so thankful to be me."},"supplication":{"scripture":"Ephesians 3:17","text":"So that Christ may dwell in your hearts through faith.","prayer":"God, I want to know who I am. Help me always remember that I am Your child. When I feel small or scared or left out, remind me that I belong to You.\n\nHelp me to be brave and kind and true. Help me to know that I am enough — not because I am perfect, but because You made me and You love me.\n\nHelp me grow up knowing who I am. Not because of what I can do or how smart I am or how nice my clothes are. But because I am Yours. That is who I am. Help me remember that every day."},"intercession":{"scripture":"Psalm 100:5","text":"For the Lord is good and His love endures forever; His faithfulness continues through all generations.","prayer":"God, I pray for other little kids who do not know they are wonderfully made. Kids who feel left out or sad or like nobody wants them. Will You show them that You made them on purpose too?\n\nI pray for kids who do not have a mommy or a daddy to tell them they are special. Will You be close to them and let them know they are loved?\n\nHelp me be the kind of friend who tells people they are special. Use me to show kids around me that You made everybody good."},"declaration":{"scripture":"Genesis 1:31","text":"God saw all that He had made, and it was very good.","prayer":"I declare today that I am wonderfully made. God looked at me and said I was very good. That is what the Bible says and I believe it.\n\nI am not a mistake. I am not too much or too little. I am exactly right. God made me with love and care and He is proud of me.\n\nI am God's child. That is who I am. And nothing can change that. Not a bad day, not a mean word, not anything. I am His. I declare it."},"warfare":{"scripture":"Romans 8:38-39","text":"Neither death nor life, neither angels nor demons... will be able to separate us from the love of God.","prayer":"God, nothing can take away who I am. Nothing can take me away from You. The Bible says nothing in all creation can separate me from Your love. Not scary things. Not bad dreams. Not mean people. Nothing.\n\nI say no to any voice that tells me I am not special or not loved. That is a lie. I am made by God and loved by God and that is the truth.\n\nNothing can touch who I am in You, God. I am safe. I am loved. I am Yours. Forever."}},"family":{"adoration":{"scripture":"Psalm 68:6","text":"God sets the lonely in families.","prayer":"God, You made families. You thought of the best idea — that people should belong together, should take care of each other, should love each other every day. That was Your idea and it was so good.\n\nI worship You for my family. You gave me a mommy and a daddy who love me so much. You put me in this house on purpose. You knew exactly what family I needed and You gave me the right one.\n\nYou are so good, God. You make sure people belong somewhere. I belong with my family. Thank You for making us a family."},"confession":{"scripture":"Colossians 3:13","text":"Bear with each other and forgive one another if any of you has a grievance against someone.","prayer":"God, sometimes I am not a good helper at home. Sometimes I am grumpy with Mommy or Daddy. Sometimes I do not listen when they call me. I am sorry for those times.\n\nHelp me to say sorry when I am unkind. Help me to hug Mommy and Daddy and say I love them even when I am tired or cranky. Help me to be a good part of our family.\n\nI want our home to be happy. Help me do my part to make it that way."},"thanksgiving":{"scripture":"Proverbs 17:6","text":"Parents are the pride of their children.","prayer":"Thank You for Daddy. Thank You that he loves me and plays with me and prays for me. He is the best daddy and I am so thankful You gave him to me.\n\nThank You for Mommy. Thank You that she holds me and sings with me and takes care of me. She makes me feel so safe.\n\nThank You for my home where I am warm and fed and loved. Not every little kid has that. I am so lucky and I am so thankful."},"supplication":{"scripture":"Joshua 24:15","text":"As for me and my household, we will serve the Lord.","prayer":"God, bless my family. Make our home a happy place where everyone feels loved. Help us be kind to each other even on hard days.\n\nHelp Mommy and Daddy love each other really well. Help them be happy and take care of each other. I want them to be okay.\n\nHelp our family serve You together. Help us pray together and be kind together and love You together. Make our family strong and good."},"intercession":{"scripture":"Ephesians 6:2","text":"Honor your father and mother — which is the first commandment with a promise.","prayer":"God, I pray for Daddy today. Whatever he is doing, be with him. Keep him safe. Help him know he is loved. Help him feel close to You.\n\nI pray for Mommy today. Take care of her. Give her rest and joy. Help her know how special she is.\n\nI pray for my family to be happy and safe. Protect our home. Keep everyone who lives in it close to You and close to each other."},"declaration":{"scripture":"Deuteronomy 6:7","text":"Talk about them when you sit at home and when you walk along the road.","prayer":"I declare that my family loves God. We are a family that prays and talks about God and takes care of each other.\n\nI declare that our home is full of love and peace. Kindness lives here. Laughter lives here. God lives here.\n\nI am proud of my family. I am proud to be a Campbell. We belong to God and we belong to each other and that is a beautiful thing."},"warfare":{"scripture":"Psalm 91:1","text":"Whoever dwells in the shelter of the Most High will rest in the shadow of the Almighty.","prayer":"God, protect my family. Keep bad things away from our home. Keep us safe when we sleep and safe when we are awake.\n\nI say no to anything that wants to hurt my family or make us fight or make us sad. Our home belongs to God and only good things are welcome here.\n\nPut Your angels around our house tonight. Keep us all safe and close to You. We are Yours, God. Take care of us."}},"heart":{"adoration":{"scripture":"Psalm 34:18","text":"The Lord is close to the brokenhearted and saves those who are crushed in spirit.","prayer":"God, You know how I feel all the time. When I am happy, You know. When I am sad, You know. When I am scared, You know. You are always close to me, especially when my heart hurts.\n\nI worship You because You care about my feelings. You do not tell me to stop crying. You come close. That makes You so good and so kind and so safe to talk to.\n\nYou made my heart able to feel so many things. I worship You for that. You are close to me always."},"confession":{"scripture":"Proverbs 15:1","text":"A gentle answer turns away wrath, but a harsh word stirs up anger.","prayer":"God, sometimes I get really upset and I am not kind about it. Sometimes I cry loud or say I do not like something in a mean way. I am sorry when I do that.\n\nHelp me use kind words even when I have big feelings. Help me take a deep breath and tell people what I need instead of getting too upset.\n\nI am still learning. Help me learn how to feel my feelings and still be kind. I want to be gentle even when things are hard."},"thanksgiving":{"scripture":"Psalm 16:11","text":"You make known to me the path of life; You will fill me with joy in Your presence.","prayer":"Thank You for happy days and silly laughs and things that make me giggle. Thank You for the feeling of being hugged and warm and safe.\n\nThank You that even when I feel sad or scared, the sadness does not stay forever. You always help me feel better. Joy always comes back.\n\nThank You for all my feelings — even the hard ones — because they tell me what I need and they help me talk to You."},"supplication":{"scripture":"Philippians 4:7","text":"The peace of God, which transcends all understanding, will guard your hearts and your minds.","prayer":"God, when I feel scared at night, will You help me remember You are there? When I have a bad dream, will You wake me up and remind me I am safe?\n\nWhen I feel sad, will You come close to me? When I am upset and I do not know why, will You help me feel better?\n\nGive me a peaceful heart, God. The kind of peace that makes me feel okay even when things are hard. Guard my heart and my mind. I trust You."},"intercession":{"scripture":"Matthew 5:4","text":"Blessed are those who mourn, for they will be comforted.","prayer":"God, I pray for kids who are scared right now. Kids who are crying and do not feel better yet. Will You go to them and help them feel less afraid?\n\nI pray for kids who are having bad dreams tonight. Will You be close to them and make the scary things go away?\n\nHelp everyone who is sad to feel Your love. Send someone to hug them. Help them know they are not alone."},"declaration":{"scripture":"Isaiah 41:10","text":"So do not fear, for I am with you; do not be dismayed, for I am your God.","prayer":"I declare that I do not have to be afraid. God is with me. He said so. Do not fear — I am with you. That is what the Bible says and I believe it.\n\nI am brave because God is with me. I am not alone in the dark. I am not alone when I feel sad. God is right here.\n\nMy heart is safe with God. He takes care of it. I do not have to carry scary feelings by myself. I give them to Him and He holds them. I declare that I am brave and I am loved."},"warfare":{"scripture":"2 Timothy 1:7","text":"For the Spirit God gave us does not make us timid, but gives us power, love and self-discipline.","prayer":"God, I say no to bad dreams and scary thoughts. They do not belong in my head because You gave me a spirit of power, not fear.\n\nI say no to anything that tries to make me feel unloved or unsafe or alone. Those are lies. The truth is God is with me and I am loved and I am safe.\n\nI am not afraid. I am a child of God and God is the biggest and strongest of all. I do not have to be scared. Nothing can get past God to get to me. I am covered and I am safe. Amen."}},"friends":{"adoration":{"scripture":"1 John 4:7","text":"Dear friends, let us love one another, for love comes from God.","prayer":"God, You invented love. All the love in the whole world started with You. When I love my friends, that is Your love coming through me. That is so amazing.\n\nI worship You because You are the most loving. You show us how to be kind and gentle and caring. You are the best friend anyone could ever have.\n\nThank You for being a God of love. Thank You for teaching me how to love people. Help me love my friends the way You love me."},"confession":{"scripture":"Ephesians 4:32","text":"Be kind and compassionate to one another, forgiving each other, just as in Christ God forgave you.","prayer":"God, sometimes I am not a good friend. Sometimes I do not share or I say something that is not kind. Sometimes I get mad at my friends and do not say sorry.\n\nI am sorry for the times I was not a good friend. Help me to say sorry when I hurt someone. Help me to be the kind of friend I would want to have.\n\nHelp me be kind and gentle and to include people who feel left out. I want to be a friend that people feel happy to be around."},"thanksgiving":{"scripture":"Proverbs 17:17","text":"A friend loves at all times.","prayer":"Thank You for friends who make me laugh and play with me and share with me. Thank You for the people who are kind to me.\n\nThank You for every good moment with a friend — a game we played, a secret we shared, a time we laughed so hard. Those are gifts from You.\n\nThank You that I never have to be lonely because You are always with me, and You give me people to love. Friends are one of Your best gifts."},"supplication":{"scripture":"Proverbs 13:20","text":"Walk with the wise and become wise, for a companion of fools suffers harm.","prayer":"God, help me find kind friends. Friends who are good and true. Friends who make me want to be my best self.\n\nHelp me be brave enough to be friendly — to say hello to someone new, to include the kid who is sitting alone, to share even when it is hard.\n\nWhen friends are unkind to me, help me forgive them. When I am unkind, help me say sorry. Help me be a good friend, God. The kind of friend that shows people what Your love looks like."},"intercession":{"scripture":"John 15:13","text":"Greater love has no one than this: to lay down one's life for one's friends.","prayer":"God, I pray for my friends today. I think of them by name and I ask You to take care of them. Help them have a good day. Help them feel loved.\n\nI pray for any friend who is having a hard time right now — who is sick or sad or scared. Be close to them. Help them feel better.\n\nI pray for the kids at school who do not have many friends. Will You help them find someone kind to play with? Help me notice them and be friendly."},"declaration":{"scripture":"Ecclesiastes 4:9","text":"Two are better than one, because they have a good return for their labor.","prayer":"I declare that I am a good friend. I share and I listen and I am kind. God made me able to love people and I will use that gift.\n\nI declare that the friendships in my life are good and true. I have people who love me and I love them back. We make each other better.\n\nFriendship is a gift from God and I will treat it like one. I will show up for my friends. I will be loyal and kind and brave and fun. I am a good friend. I declare it."},"warfare":{"scripture":"Colossians 3:14","text":"And over all these virtues put on love, which binds them all together in perfect harmony.","prayer":"God, I say no to unkind words between me and my friends. I say no to leaving people out on purpose. I say no to jealousy and meanness and gossip.\n\nI say yes to kindness. I say yes to sharing. I say yes to being the friend who includes everyone. Love is stronger than all the bad stuff and I choose love.\n\nProtect my friendships from drama and hurt. Help me forgive fast and love well. My friendships belong to God and I ask Him to protect them."}},"mind":{"adoration":{"scripture":"Proverbs 2:6","text":"For the Lord gives wisdom; from his mouth come knowledge and understanding.","prayer":"God, You know everything. You made the whole world and You understand how everything works. Every question I could ever ask — You already know the answer.\n\nI worship You because You are so wise and so smart and You share Your wisdom with me. When I learn something new, that is a gift from You. When I understand something, You helped me do that.\n\nI love that You made me curious. I love that You made my brain able to think and wonder and figure things out. You are an amazing God and You made an amazing mind inside me."},"confession":{"scripture":"Romans 12:2","text":"Do not conform to the pattern of this world, but be transformed by the renewing of your mind.","prayer":"God, sometimes I think about scary things or mean things and I cannot stop. Sometimes I worry too much. I am sorry for when I fill my mind with things that are not good.\n\nHelp me put good things in my mind. Good stories, good thoughts, good words. Help me think about things that are true and kind and beautiful.\n\nWhen bad thoughts come, help me tell them to go away and think about You instead. Help me fill my mind with good things."},"thanksgiving":{"scripture":"1 Corinthians 2:16","text":"But we have the mind of Christ.","prayer":"Thank You for giving me a mind that can think and wonder and learn. Thank You that I get to go to school and learn new things. Thank You that the world is full of so much to discover.\n\nThank You for books and stories and songs that fill my mind with wonderful things. Thank You for questions — I love asking questions.\n\nThank You that You gave me the ability to understand things. Every time I learn something, I want to thank You. You made my brain and it is so good."},"supplication":{"scripture":"James 1:5","text":"If any of you lacks wisdom, let him ask God, who gives generously to all without finding fault.","prayer":"God, help me learn well. Help me pay attention and remember things and understand what people are teaching me.\n\nWhen I am confused, help me ask for help. When I do not understand, help me keep trying. Help me be brave about learning even when it is hard.\n\nGive me wisdom, God. Not just smart-knowledge, but wisdom — knowing what is right and good and true. I am asking You for wisdom and You said You would give it to me. Thank You."},"intercession":{"scripture":"Proverbs 22:6","text":"Start children off on the way they should go, and even when they are old they will not turn from it.","prayer":"God, I pray for all the kids who are learning today. Help every child who is trying hard to understand something. Make learning feel good and exciting and not too scary.\n\nI pray for kids who think they are not smart. Help them know that You made their brain and it is good. Help them find the ways they are smart.\n\nI pray for teachers who help kids learn. Give them patience and creativity and love for every child in their class."},"declaration":{"scripture":"Daniel 1:17","text":"To these four young men God gave knowledge and understanding of all kinds of literature and learning.","prayer":"I declare that God gave me a good mind. I am a learner. I am curious and I ask good questions and I keep trying even when things are hard.\n\nI declare that I will fill my mind with true things and good things and beautiful things. My mind belongs to God and I will use it for good.\n\nI am getting smarter and wiser every day because God is teaching me. I declare that learning is exciting and my mind is a gift and I will use it well."},"warfare":{"scripture":"2 Corinthians 10:5","text":"We take captive every thought to make it obedient to Christ.","prayer":"God, I say no to scary thoughts at bedtime. I say no to thoughts that tell me I am not smart or not good. Those thoughts are not from You and I do not want them.\n\nWhen bad thoughts come, help me think about You instead. Think about good things — things that are true and lovely and good. That is what the Bible says to do and I will do it.\n\nMy mind is protected by God. Nothing scary gets to stay there. I fill it with good things and God's truth and I say no to everything else."}},"body":{"adoration":{"scripture":"Psalm 139:13","text":"For you created my inmost being; you knit me together in my mother's womb.","prayer":"God, You made my body. You decided everything — my hands and my feet and my eyes and my smile. You made me exactly right. I worship You for being such a good maker.\n\nI worship You that my body works — I can run and jump and dance and hug and eat yummy food and sleep. My body can do so many things. You made it so good.\n\nThank You for the gift of being alive in a body. I worship You, the God who made me and who makes all living things."},"confession":{"scripture":"1 Corinthians 6:19","text":"Do you not know that your bodies are temples of the Holy Spirit?","prayer":"God, sometimes I do not take good care of my body. Sometimes I do not want to eat my vegetables or go to sleep when it is bedtime. I am sorry when I fight against the things that are good for me.\n\nHelp me to listen to Mommy and Daddy when they say it is time to sleep or time to eat healthy food. They are taking care of the body You gave me.\n\nMy body is a home for Your Holy Spirit. Help me treat it like something precious because You live inside me."},"thanksgiving":{"scripture":"Psalm 18:32","text":"It is God who arms me with strength and keeps my way secure.","prayer":"Thank You that I am healthy and strong. Thank You for legs that run and arms that hug and a voice that sings. Thank You for every part of my body that works.\n\nThank You for yummy food that makes me grow. Thank You for sleep that helps me feel better. Thank You for the sunshine and fresh air that make my body feel good.\n\nI am thankful to be alive. I am thankful for this body You gave me. It is wonderful and I will take care of it."},"supplication":{"scripture":"3 John 1:2","text":"I pray that you may enjoy good health and that all may go well with you.","prayer":"God, keep me healthy and strong. When I am sick, will You help me feel better? When I am tired, will You give me good rest?\n\nHelp me grow big and strong the way You planned. Help me eat good food and sleep enough and go outside and play.\n\nWatch over my body, God. Take care of me. And take care of Mommy and Daddy and everyone I love too. Keep us all healthy and strong."},"intercession":{"scripture":"James 5:14-15","text":"Is anyone among you sick? Let them call the elders of the church to pray over them.","prayer":"God, I pray for kids who are sick right now. Kids who are in the hospital or who do not feel well. Will You be close to them and help them feel better?\n\nI pray for kids whose bodies are different or who have a hard time with things other kids can do easily. Help them know their body is still beautiful and made by You.\n\nSend healing where it is needed, God. Take care of every child's body. You are a God who heals and I am asking You to heal."},"declaration":{"scripture":"Isaiah 40:31","text":"But those who hope in the Lord will renew their strength.","prayer":"I declare that God takes care of my body. He made it and He watches over it. I am strong and healthy and growing every day.\n\nI declare that when I am sick, God heals me. When I am tired, God gives me rest. My body belongs to God and He is a good caretaker.\n\nI am growing up big and strong. God is with me in my body — every heartbeat, every breath. I am alive and I am well and I belong to Him."},"warfare":{"scripture":"Isaiah 53:5","text":"By his wounds we are healed.","prayer":"God, I say no to sickness trying to live in my body. I say no to anything that wants to hurt me or make me weak. Jesus won healing for me.\n\nI cover my body with Your protection tonight. Guard my throat and my tummy and my head. Help me sleep well and wake up feeling good.\n\nMy body is protected by God. He keeps watch over me even when I am asleep. Nothing can come near me without going through Him first. I am safe. I am covered. I am healed by Jesus. Amen."}},"faith":{"adoration":{"scripture":"Psalm 95:6","text":"Come, let us bow down in worship, let us kneel before the Lord our Maker.","prayer":"God, You are real. You made everything and You know everything and You love everyone. You are bigger than anything I can imagine and also small enough to be right here with me.\n\nI worship You because You are God. There is no one like You. Not anywhere. Not ever. You are holy and good and true and I love You.\n\nI worship You just because of who You are. Not for anything You did for me — just because You are God. And that is enough. You are so worthy of all my love."},"confession":{"scripture":"Mark 9:24","text":"I do believe; help me overcome my unbelief.","prayer":"God, sometimes I forget that You are real. Sometimes when things are scary or sad I forget that You are with me. I am sorry for those times when I forgot to trust You.\n\nHelp my faith grow. Help me believe even when I cannot see. Help me trust You even when things are hard. I believe in You — help me believe even more.\n\nI want to know You better every day. I do not want to just know about You — I want to actually know You, like a friend. Help me do that."},"thanksgiving":{"scripture":"John 3:16","text":"For God so loved the world that he gave his one and only Son.","prayer":"Thank You, God, for loving me so much that You sent Jesus. That is the biggest love of all. You gave the most important thing because You love me. That makes me feel so loved and so safe.\n\nThank You that I can talk to You anytime, anywhere. I do not have to be in church. I do not have to use special words. I can just talk to You like I am talking right now. That is so good.\n\nThank You for being my God. Thank You for being real. Thank You for being close. I am so thankful I get to know You."},"supplication":{"scripture":"Matthew 17:20","text":"Truly I tell you, if you have faith as small as a mustard seed, you can say to this mountain, 'Move from here to there,' and it will move.","prayer":"God, help my faith grow. Even when it is tiny, You said a tiny bit of faith is enough. Help me use the faith I have.\n\nHelp me pray and believe that You hear me. Help me read about You and learn more about You. Help me know that You are real and You are good and You are with me.\n\nI want to know You my whole life. When I grow up I want to still love You and talk to You and trust You. Start that in me right now, when I am little. Help me know You and love You always."},"intercession":{"scripture":"Acts 2:39","text":"The promise is for you and your children and for all who are far off.","prayer":"God, I pray for kids who do not know You yet. Kids who have never heard that You love them. Will You find a way to reach them? Will You send someone to tell them about You?\n\nI pray for kids whose family does not talk about God. Help them find You somehow. Help them know You are real and You love them.\n\nUse me, God. Even when I am little, use me. Let my joy and my kindness show other kids something about You. Let my life point to You."},"declaration":{"scripture":"Psalm 23:1","text":"The Lord is my shepherd, I lack nothing.","prayer":"I declare that God is my shepherd. He takes care of me. He leads me and guides me and protects me. I do not need to be afraid because He is with me.\n\nI declare that I know God and He knows me. We are friends. I talk to Him and He listens. He talks to me and I am learning to listen. We belong to each other.\n\nI will follow Jesus my whole life. When I am little and when I am big and when I am old — I will always belong to God. That is my declaration. That is who I am. I am His. Forever."},"warfare":{"scripture":"1 John 4:4","text":"You, dear children, are from God and have overcome them, because the one who is in you is greater than the one who is in the world.","prayer":"God, the one who lives in me is greater than anything in the world. That is what the Bible says. Greater. You win every time.\n\nI say no to anything that tries to take my faith away. I say no to lies that say God is not real or that He does not love me. Those are lies. God is real and He loves me and nothing can change that.\n\nI am protected by the God who made everything. I am covered by the blood of Jesus. I am filled with the Holy Spirit. I am a child of God and no enemy can touch what belongs to Him. I am safe. I am His. Now and always. Amen."}}};

F.map(function(fn,i){
var fd=MAP[st.ad]?MAP[st.ad][fn.id]:null;
if(!fd)return '';
return '<div class="full-card" style="animation-delay:'+i*.07+'s">'+

:'')+

if(st.vm==='full')document.querySelectorAll('.full-card').forEach(function(el,i){setTimeout(function(){el.style.opacity='1'},i*80)});
document.querySelectorAll('[data-d]').forEach(function(b){b.addEventListener('click',function(){st.ad=b.dataset.d;st.af=null;st.vm='single';r();window.scrollTo({top:document.querySelector('.domain-nav').offsetTop-20,behavior:'smooth'})})});
document.querySelectorAll('[data-f]').forEach(function(b){b.addEventListener('click',function(){st.af=b.dataset.f;r();window.scrollTo({top:document.querySelector('.content').offsetTop-20,behavior:'smooth'})})});
